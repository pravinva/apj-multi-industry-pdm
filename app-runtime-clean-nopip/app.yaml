command:
  - "python"
  - "-m"
  - "uvicorn"
  - "server:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
env:
  - name: OT_PDM_OWNER_USER
    value: "pravin.varma@databricks.com"
  # Leave warehouse unset to allow runtime auto-discovery in each workspace.
  # Set explicitly only when you need to pin a specific SQL warehouse.
  # ~15m demo: long-lived SQL cache for stable UC data; predictions + stream stay short (see server.py).
  - name: OT_PDM_SQL_CACHE_TTL_S
    value: "900"
  - name: OT_PDM_PREDICTIONS_CACHE_TTL_S
    value: "30"
  - name: OT_PDM_STREAM_SQL_CACHE_TTL_S
    value: "5"
  - name: OT_PDM_UI_OVERVIEW_CACHE_TTL_S
    value: "300"
  - name: OT_PDM_UI_HIERARCHY_CACHE_TTL_S
    value: "300"
  - name: OT_PDM_UI_RESPONSE_CACHE_TTL_S
    value: "900"
  # Asset detail + Model tab UI cache; align with predictions (default: OT_PDM_PREDICTIONS_CACHE_TTL_S).
  - name: OT_PDM_UI_ASSET_MODEL_CACHE_TTL_S
    value: "30"
  - name: OT_PDM_GEO_SITES_CACHE_TTL_S
    value: "900"
  - name: OT_PDM_SKIP_LIVE_SCORING_ON_READ
    value: "true"
  # Simulator inject+score: false = fast demo (warehouse INSERTs only); true = DLT + batch scoring jobs.
  - name: OT_PDM_SIMULATOR_INJECT_USE_JOBS
    value: "false"
  # Executive Finance work orders: auto = Lakebase ODS when seeded (SAP BDC demo), else synthetic.
  - name: OT_PDM_EXECUTIVE_WO_SOURCE
    value: "auto"
  - name: OT_PDM_SCORING_JOB_ID_MINING
    value: "946602210024255"
  - name: OT_PDM_SCORING_JOB_ID_ENERGY
    value: "778299542538872"
  - name: OT_PDM_SCORING_JOB_ID_WATER
    value: "985647723345135"
  - name: OT_PDM_SCORING_JOB_ID_AUTOMOTIVE
    value: "602507818889830"
  - name: OT_PDM_SCORING_JOB_ID_SEMICONDUCTOR
    value: "41975658448352"
