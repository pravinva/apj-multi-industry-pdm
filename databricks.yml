bundle:
  name: ot-pdm-intelligence

sync:
  exclude:
    - "app/node_modules/**"
    - "app/.npmrc"
    - "app/package-lock.json"

variables:
  industry:
    description: "Industry skin to deploy"
    default: mining
  use_simulator:
    description: "Use OT simulator instead of live Zerobus connector"
    default: "false"
  zerobus_source_table:
    description: "Bronze source table for Zerobus ingest in bronze schema"
    default: "pravin_zerobus"
  catalog_name:
    description: "Unity Catalog catalog name"
    default: "pdm_${var.industry}"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com

resources:
  pipelines:
    ot_pdm_dlt_pipeline:
      name: ot-pdm-dlt-${var.industry}
      continuous: true
      clusters:
        - label: default
          num_workers: 1
      libraries:
        - file:
            path: core/dlt/bronze.py
        - file:
            path: core/dlt/silver.py
        - file:
            path: core/dlt/gold.py
      configuration:
        industry: ${var.industry}
        use_simulator: ${var.use_simulator}
        zerobus_source_table: ${var.zerobus_source_table}
        catalog_name: ${var.catalog_name}
      catalog: ${var.catalog_name}
      target: bronze

  experiments:
    ot_pdm_mlflow_experiment:
      name: /Shared/ot-pdm-intelligence/${var.industry}

  jobs:
    ot_pdm_zerobus_connector_job:
      name: ot-pdm-zerobus-connector-${var.industry}
      tasks:
        - task_key: ingest_real_zerobus
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5.xlarge
            num_workers: 1
            aws_attributes:
              ebs_volume_count: 1
              ebs_volume_size: 100
          spark_python_task:
            python_file: core/zerobus_ingest/run_connector.py
            parameters:
              - "--industry"
              - "${var.industry}"
          libraries:
            - pypi:
                package: unified-ot-zerobus-connector

    ot_pdm_scoring_job:
      name: ot-pdm-scoring-${var.industry}
      tasks:
        - task_key: batch_score
          existing_cluster_id: 0127-122435-da5izx1u
          spark_python_task:
            python_file: core/ml/batch_score.py
            parameters:
              - "--industry"
              - "${var.industry}"
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: "0 0 */2 * * ?"
        timezone_id: UTC

    ot_pdm_training_job:
      name: ot-pdm-training-${var.industry}
      tasks:
        - task_key: train_models
          existing_cluster_id: 0127-122435-da5izx1u
          spark_python_task:
            python_file: core/ml/train.py
            parameters:
              - "--industry"
              - "${var.industry}"
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: UTC

    ot_pdm_financial_backfill_job:
      name: ot-pdm-financial-backfill-${var.industry}
      tasks:
        - task_key: generate_financial_daily
          existing_cluster_id: 0127-122435-da5izx1u
          spark_python_task:
            python_file: core/finance/generate_financials.py
            parameters:
              - "--industry"
              - "${var.industry}"
              - "--catalog"
              - "${var.catalog_name}"
              - "--days"
              - "730"
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: "0 15 1 * * ?"
        timezone_id: UTC

