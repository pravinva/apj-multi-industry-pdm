bundle:
  name: ot-pdm-intelligence

sync:
  exclude:
    - "app/node_modules/**"
    - "app/.venv/**"
    - "app/dist/**"
    - "app/.zerobus-configs/**"
    - "app/.zerobus-key"
    - "app/.npmrc"
    - "app/package-lock.json"

variables:
  industry:
    description: "Industry skin to deploy"
    default: mining
  use_simulator:
    description: "Deprecated: ingest source is unified; simulator and connector both land in zerobus_source_table"
    default: "false"
  zerobus_source_table:
    description: "Bronze source table for Zerobus ingest in bronze schema"
    default: "pravin_zerobus"
  pi_source_table:
    description: "Bronze source table for PI-sim ingest in bronze schema"
    default: "pi_simulated_tags"
  catalog_name:
    description: "Unity Catalog catalog name"
    default: "classic_stable_zz47bh_catalog"
  job_node_type_id:
    description: "Node type for scheduled jobs (portable across workspaces)"
    default: "m5.xlarge"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-classic-stable-zz47bh.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/ot-pdm-intelligence-fevm/dev
  prod:
    mode: production
    workspace:
      host: https://fevm-classic-stable-zz47bh.cloud.databricks.com

resources:
  apps:
    ot_pdm_app:
      name: ot-pdm-app
      description: "OT PdM Intelligence Databricks App"
      source_code_path: app

  pipelines:
    # Continuous: new Zerobus/PI data is picked up as it lands (typical demo / streaming path).
    # Optional batch refresh: job ot-pdm-dlt-daily-refresh-all-industries (PAUSED by default) calls
    # core/dlt/trigger_pipeline_updates.py — unpause only if you need a daily API kick or use triggered mode.
    ot_pdm_dlt_pipeline:
      name: ot-pdm-dlt-${var.industry}
      allow_duplicate_names: true
      continuous: true
      clusters:
        - label: default
          num_workers: 1
      libraries:
        - file:
            path: core/dlt/bronze.py
        - file:
            path: core/dlt/silver.py
        - file:
            path: core/dlt/gold.py
      configuration:
        industry: ${var.industry}
        zerobus_source_table: ${var.zerobus_source_table}
        pi_source_table: ${var.pi_source_table}
        catalog_name: ${var.catalog_name}
      catalog: ${var.catalog_name}
      target: bronze

  experiments:
    ot_pdm_mlflow_experiment:
      name: /Shared/ot-pdm-intelligence/${var.industry}

  jobs:
    ot_pdm_zerobus_connector_job:
      name: ot-pdm-zerobus-connector-${var.industry}
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - unified-ot-zerobus-connector
      tasks:
        - task_key: ingest_real_zerobus
          environment_key: default
          spark_python_task:
            python_file: core/zerobus_ingest/run_connector.py
            parameters:
              - "--industry"
              - "${var.industry}"

    ot_pdm_scoring_job:
      name: ot-pdm-scoring-${var.industry}
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - mlflow
              - pandas
              - numpy
              - scikit-learn
              - pyyaml
      tasks:
        - task_key: batch_score
          environment_key: default
          spark_python_task:
            python_file: core/ml/batch_score.py
            parameters:
              - "--industry"
              - "${var.industry}"
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: "0 0 */2 * * ?"
        timezone_id: UTC

    ot_pdm_training_job:
      name: ot-pdm-training-${var.industry}
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - mlflow
              - pandas
              - numpy
              - scikit-learn
              - pyyaml
      tasks:
        - task_key: train_models
          environment_key: default
          spark_python_task:
            python_file: core/ml/train.py
            parameters:
              - "--industry"
              - "${var.industry}"
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: UTC

    # Legacy per-bundle-var name; schedule PAUSED — use ot_pdm_demo_scheduled_refresh instead
    # so finance + ERP refresh together on one cadence (avoids duplicate finance runs).
    ot_pdm_financial_backfill_job:
      name: ot-pdm-financial-backfill-${var.industry}
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - pyyaml
              - pandas
      tasks:
        - task_key: generate_financial_daily
          environment_key: default
          spark_python_task:
            python_file: core/finance/generate_financials.py
            parameters:
              - "--industry"
              - "all"
              - "--days"
              - "1095"
      schedule:
        pause_status: PAUSED
        quartz_cron_expression: "0 15 1 * * ?"
        timezone_id: UTC

    ot_pdm_workspace_bootstrap_job:
      name: ot-pdm-workspace-bootstrap
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - pyyaml
      tasks:
        - task_key: bootstrap_all_data_and_setup
          environment_key: default
          notebook_task:
            notebook_path: ${workspace.file_path}/RUNME_BOOTSTRAP_ALL
            source: WORKSPACE
            base_parameters:
              industries_csv: "mining,energy,water,automotive,semiconductor"
              history_days: "730"
              grant_principal: "users"
              trigger_jobs: "true"
              reset_existing: "true"
              seed_demo_planning_case: "true"

    # SAP/BDC + Lakebase work_orders demo (Executive ODS). Safe to re-run (replaces SAP_BDC_DEMO only).
    # Scheduled weekly via ot_pdm_demo_scheduled_refresh; keep this job for manual runs.
    ot_pdm_erp_bdc_seed_job:
      name: ot-pdm-erp-bdc-seed-refresh
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - pyyaml
      tasks:
        - task_key: refresh_erp_bdc_all_industries
          environment_key: default
          spark_python_task:
            python_file: core/erp_bdc/run_erp_bdc_seed_job.py
            parameters:
              - "--industries"
              - "mining,energy,water,automotive,semiconductor"

    # Weekly demo data refresh: ~3y finance (industry + site) through "today", plus ERP/BDC ODS slice.
    # Unpause after deploy so long-lived demos keep quarter/year charts current without re-bootstrap.
    ot_pdm_demo_scheduled_refresh:
      name: ot-pdm-demo-scheduled-refresh
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - pyyaml
              - pandas
      tasks:
        - task_key: refresh_finance_all_industries
          environment_key: default
          spark_python_task:
            python_file: core/finance/generate_financials.py
            parameters:
              - "--industry"
              - "all"
              - "--days"
              - "1095"
        - task_key: refresh_erp_bdc_demo
          environment_key: default
          spark_python_task:
            python_file: core/erp_bdc/run_erp_bdc_seed_job.py
            parameters:
              - "--industries"
              - "mining,energy,water,automotive,semiconductor"
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: "0 30 3 ? * SAT *"
        timezone_id: UTC

    # Optional: POST a pipeline update for each ot-pdm-dlt-<industry> (recovery / forced sync).
    # With continuous: true pipelines, schedules are usually redundant — leave PAUSED unless ops wants a daily kick.
    ot_pdm_dlt_daily_refresh_job:
      name: ot-pdm-dlt-daily-refresh-all-industries
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: trigger_dlt_updates_all_skins
          environment_key: default
          spark_python_task:
            python_file: core/dlt/trigger_pipeline_updates.py
            parameters:
              - "--industries"
              - "mining,energy,water,automotive,semiconductor"
      schedule:
        pause_status: PAUSED
        quartz_cron_expression: "0 0 4 * * ?"
        timezone_id: UTC

