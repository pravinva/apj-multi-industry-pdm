sensors:
  stamping_press:
  - name: die_temp
    display: Die Temp
    unit: C
    opc_ua_node: ns=2;s=Press.DieTemp
    normal_range:
    - 45
    - 75
    warning_threshold: 85
    critical_threshold: 95
    dir: 1
    failure_mode: die_wear
  - name: stroke_force
    display: Stroke Force
    unit: kN
    opc_ua_node: ns=2;s=Press.StrokeForce
    normal_range:
    - 650
    - 900
    warning_threshold: 960
    critical_threshold: 1020
    dir: 1
    failure_mode: die_wear
  - name: cycle_time
    display: Cycle Time
    unit: s
    opc_ua_node: ns=2;s=Press.CycleTime
    normal_range:
    - 3.8
    - 4.6
    warning_threshold: 5.1
    critical_threshold: 5.7
    dir: 1
    failure_mode: null
  robotic_welder:
  - name: servo_temp
    display: Servo Temp
    unit: C
    opc_ua_node: ns=2;s=Welder.ServoTemp
    normal_range:
    - 36
    - 58
    warning_threshold: 64
    critical_threshold: 72
    dir: 1
    failure_mode: servo_degradation
  - name: torch_current
    display: Torch Current
    unit: A
    opc_ua_node: ns=2;s=Welder.Current
    normal_range:
    - 180
    - 260
    warning_threshold: 280
    critical_threshold: 300
    dir: 1
    failure_mode: servo_degradation
  - name: seam_quality_idx
    display: Seam Quality Index
    unit: idx
    opc_ua_node: ns=2;s=Welder.SeamQuality
    normal_range:
    - 0.8
    - 0.98
    warning_threshold: 0.75
    critical_threshold: 0.65
    dir: -1
    failure_mode: servo_degradation
  cnc_machine:
  - name: spindle_vibration
    display: Spindle Vibration
    unit: mm/s
    opc_ua_node: ns=2;s=CNC.SpindleVib
    normal_range:
    - 0.9
    - 2.4
    warning_threshold: 3.4
    critical_threshold: 4.8
    dir: 1
    failure_mode: bearing_wear
  assembly_conveyor:
  - name: conveyor_speed
    display: Conveyor Speed
    unit: m/s
    opc_ua_node: ns=2;s=CV.Speed
    normal_range:
    - 0.6
    - 1.2
    warning_threshold: 0.45
    critical_threshold: 0.3
    dir: -1
    failure_mode: null
failure_modes:
  die_wear:
    display: Die Wear
    sensors:
    - die_temp
    - stroke_force
    mtbf_hours: 1500
    repair_time_hours: 8.0
    cost_per_event: 2600000
    downtime_type: planned
  servo_degradation:
    display: Servo Degradation
    sensors:
    - servo_temp
    - torch_current
    - seam_quality_idx
    mtbf_hours: 1800
    repair_time_hours: 6.5
    cost_per_event: 1800000
    downtime_type: unplanned
  bearing_wear:
    display: Bearing Wear
    sensors:
    - spindle_vibration
    mtbf_hours: 2200
    repair_time_hours: 4.0
    cost_per_event: 900000
    downtime_type: planned
features:
- name: mean_15m
  formula: mean
  window: 15 minutes
  apply_to: all
- name: stddev_15m
  formula: stddev
  window: 15 minutes
  apply_to: all
- name: slope_1h
  formula: slope
  window: 1 hour
  apply_to: all
- name: zscore_30d
  formula: zscore
  window: 30 days
  apply_to: all
- name: cumsum_24h
  formula: cumsum
  window: 1 day
  apply_to: all
