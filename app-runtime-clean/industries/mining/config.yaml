sensors:
  haul_truck:
  - name: engine_egt
    display: Engine EGT
    unit: C
    opc_ua_node: ns=2;s=Engine.EGT
    normal_range:
    - 480
    - 620
    warning_threshold: 680
    critical_threshold: 740
    dir: 1
    failure_mode: engine_overheat
  - name: coolant_temp
    display: Coolant Temp
    unit: C
    opc_ua_node: ns=2;s=Engine.CoolantTemp
    normal_range:
    - 75
    - 92
    warning_threshold: 97
    critical_threshold: 104
    dir: 1
    failure_mode: engine_overheat
  - name: oil_temp
    display: Oil Temp
    unit: C
    opc_ua_node: ns=2;s=Engine.OilTemp
    normal_range:
    - 68
    - 88
    warning_threshold: 95
    critical_threshold: 102
    dir: 1
    failure_mode: bearing_wear
  - name: vibration_rms
    display: Vibration RMS
    unit: mm/s
    opc_ua_node: ns=2;s=Drive.Vibration
    normal_range:
    - 1.2
    - 3.1
    warning_threshold: 4.5
    critical_threshold: 6.5
    dir: 1
    failure_mode: bearing_wear
  - name: tyre_pressure_fl
    display: Tyre Pressure FL
    unit: psi
    opc_ua_node: ns=2;s=Tyre.FL.Pressure
    normal_range:
    - 85
    - 105
    warning_threshold: 80
    critical_threshold: 72
    dir: -1
    failure_mode: tyre_blowout
  - name: tyre_pressure_fr
    display: Tyre Pressure FR
    unit: psi
    opc_ua_node: ns=2;s=Tyre.FR.Pressure
    normal_range:
    - 85
    - 105
    warning_threshold: 80
    critical_threshold: 72
    dir: -1
    failure_mode: tyre_blowout
  - name: payload_weight
    display: Payload Weight
    unit: t
    opc_ua_node: ns=2;s=Payload.Weight
    normal_range:
    - 210
    - 280
    warning_threshold: 295
    critical_threshold: 310
    dir: 1
    failure_mode: null
  - name: fuel_rate
    display: Fuel Rate
    unit: lph
    opc_ua_node: ns=2;s=Engine.FuelRate
    normal_range:
    - 180
    - 350
    warning_threshold: 380
    critical_threshold: 430
    dir: 1
    failure_mode: engine_overheat
  conveyor:
  - name: belt_tension
    display: Belt Tension
    unit: kN
    opc_ua_node: ns=2;s=Conveyor.BeltTension
    normal_range:
    - 46
    - 62
    warning_threshold: 68
    critical_threshold: 74
    dir: 1
    failure_mode: belt_slip
  - name: motor_current
    display: Motor Current
    unit: A
    opc_ua_node: ns=2;s=Conveyor.MotorCurrent
    normal_range:
    - 220
    - 300
    warning_threshold: 330
    critical_threshold: 360
    dir: 1
    failure_mode: motor_overload
  - name: roller_vibration
    display: Roller Vibration
    unit: mm/s
    opc_ua_node: ns=2;s=Conveyor.RollerVibration
    normal_range:
    - 1.0
    - 2.8
    warning_threshold: 3.8
    critical_threshold: 5.5
    dir: 1
    failure_mode: bearing_wear
  - name: throughput_rate
    display: Throughput Rate
    unit: tph
    opc_ua_node: ns=2;s=Conveyor.Throughput
    normal_range:
    - 1500
    - 2200
    warning_threshold: null
    critical_threshold: null
    dir: 1
    failure_mode: null
failure_modes:
  engine_overheat:
    display: Engine Overheat
    sensors:
    - engine_egt
    - coolant_temp
    - fuel_rate
    mtbf_hours: 2400
    repair_time_hours: 8.0
    cost_per_event: 45000
    downtime_type: unplanned
  bearing_wear:
    display: Bearing Wear
    sensors:
    - vibration_rms
    - oil_temp
    - roller_vibration
    mtbf_hours: 1900
    repair_time_hours: 6.0
    cost_per_event: 12000
    downtime_type: planned
  tyre_blowout:
    display: Tyre Blowout
    sensors:
    - tyre_pressure_fl
    - tyre_pressure_fr
    mtbf_hours: 1400
    repair_time_hours: 3.0
    cost_per_event: 8000
    downtime_type: unplanned
  belt_slip:
    display: Belt Slip
    sensors:
    - belt_tension
    mtbf_hours: 2200
    repair_time_hours: 4.0
    cost_per_event: 25000
    downtime_type: unplanned
  motor_overload:
    display: Motor Overload
    sensors:
    - motor_current
    mtbf_hours: 2600
    repair_time_hours: 5.0
    cost_per_event: 35000
    downtime_type: unplanned
features:
- name: mean_15m
  formula: mean
  window: 15 minutes
  apply_to: all
- name: stddev_15m
  formula: stddev
  window: 15 minutes
  apply_to: all
- name: slope_1h
  formula: slope
  window: 1 hour
  apply_to: all
- name: zscore_30d
  formula: zscore
  window: 30 days
  apply_to: all
- name: cumsum_24h
  formula: cumsum
  window: 1 day
  apply_to: all
agent:
  persona: Mining maintenance supervisor assistant
  system_prompt_file: industries/mining/system_prompt.txt
  terminology:
    asset: haul truck
    asset_plural: haul trucks
    downtime_event: unplanned TOR event
    maintenance_window: maintenance window
    production_unit: tonnes
    cost_currency: AUD
    cost_event_label: cost per downtime event
    site_timezone: AWST
dashboard:
  primary_kpi: fleet_health_score
  kpis:
  - label: Fleet health
    field: health_score_pct
    format: percent_1dp
    good_direction: up
    good_threshold: 85
  - label: Critical assets
    field: critical_assets
    format: integer
    good_direction: down
    good_threshold: 1
  - label: Avoided cost
    field: avoided_cost
    format: currency
    good_direction: up
    good_threshold: 100000
